<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý thành viên</title>
  <style>
    body { font-family: Arial; background: #f4f4f4; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #2196F3; color: white; }
    button { padding: 6px 12px; background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #d32f2f; }
    a { text-decoration: none; color: #2196F3; }
  </style>
</head>
<body>
  <h1>👥 Quản lý thành viên</h1>

  <table>
    <thead>
      <tr>
        <th>STT</th>
        <th>Tên</th>
        <th>Vị trí</th>
        <th>Số áo</th>
        <th>Xoá</th>
      </tr>
    </thead>
    <tbody>
      {% for player in players %}
      <tr>
        <td>{{ player.order }}</td>
        <td>{{ player.name }}</td>
        <td>{{ player.position }}</td>
        <td>{{ player.number }}</td>
        <td>
          <form method="POST" action="{{ url_for('delete_player', player_id=player.id) }}" 
                onsubmit="return confirm('Bạn có chắc muốn xoá {{ player.name }}?');">
            <button type="submit">🗑️ Xoá</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <p><a href="{{ url_for('index', admin=1) }}">⬅️ Quay về trang chủ</a></p>
</body>
</html>
