<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý thành viên</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f9f9f9; }
        h2 { margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 8px 10px; border: 1px solid #ddd; text-align: center; vertical-align: middle; }
        th { background: #007bff; color: white; }
        input[type="text"], input[type="number"] { width: 90%; padding: 5px; }
        select { width: 100%; }
        button { padding: 6px 10px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-save { background: #28a745; color: white; font-weight: bold; }
        .btn-add { background: #17a2b8; color: white; font-weight: bold; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-upload { background: #ffc107; color: #333; }
        .btn-back { background: #6c757d; color: white; margin-right: 10px; }
        .btn-save:hover { background: #218838; }
        .btn-add:hover { background: #138496; }
        .btn-delete:hover { background: #c82333; }
        .btn-upload:hover { background: #e0a800; }
        .btn-back:hover { background: #5a6268; }
        .avatar-thumb { width: 42px; height: 42px; object-fit: cover; border-radius: 50%; border: 1px solid #ccc; }
        .avatar-controls { display: grid; gap: 6px; justify-items: center; }
        .avatar-controls input[type="file"] { width: 180px; font-size: 12px; }
    </style>
</head>
<body>
    <h2>⚙️ Quản lý thành viên đội bóng</h2>

    <form id="players-form" method="POST" action="{{ url_for('admin_players') }}">
        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Tên cầu thủ</th>
                    <th>Số áo</th>
                    <th>Vị trí</th>
                    <th>Avatar</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="players-table">
                {% for p in players %}
                <tr>
                    <td><input type="number" name="stt_{{p.id}}" value="{{p.get('stt', loop.index)}}" min="1"></td>
                    <td><input type="text" name="name_{{p.id}}" value="{{p.name}}"></td>
                    <td><input type="number" name="number_{{p.id}}" value="{{p.number}}"></td>
                    <td>
                        <select name="position_{{p.id}}" class="position-select" multiple="multiple">
                            {% set positions = ['GK','LB','RB','CB','LW','RW','SS','ST','CF','LM','RM','AM','CM','DM','COACH','CLUB OWNER','BHL'] %}
                            {% set player_positions = p.position.split(',') if p.position else [] %}
                            {% for pos in positions %}
                                <option value="{{pos}}" {% if pos in player_positions %}selected{% endif %}>{{pos}}</option>
                            {% endfor %}
                        </select>
                    </td>
                    <td>
                        <div class="avatar-controls">
                            <img class="avatar-thumb" src="{{ p.get('avatar_url') or p.get('avatar', '/static/avatar-default.svg') }}" onerror="this.src='/static/avatar-default.svg'" alt="avatar">
                            <form id="avatar-form-{{p.id}}" method="POST" action="{{ url_for('upload_avatar', player_id=p.id) }}" enctype="multipart/form-data"></form>
                            <input type="file" name="avatar" accept="image/*" form="avatar-form-{{p.id}}">
                            <button type="submit" class="btn-upload" form="avatar-form-{{p.id}}">Upload Avatar</button>
                        </div>
                    </td>
                    <td>
                        <button type="submit" class="btn-delete" form="players-form" formaction="{{ url_for('delete_player', player_id=p.id) }}" formmethod="POST" onclick="return confirm('Xóa cầu thủ {{p.name}}?')">🗑</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <br>
        <button type="button" class="btn-add" id="add-player">+ Thêm cầu thủ mới</button>
        <br><br>
        <a href="{{ url_for('index', admin=1) }}" class="btn-back">⬅️ Quay lại</a>
        <button type="submit" class="btn-save">💾 Lưu thay đổi</button>
    </form>

    <script>
        $(document).ready(function() {
            function initSelect() {
              $('.position-select').select2({
                  placeholder: "Chọn vị trí...",
                  allowClear: true,
                  width: 'resolve'
              });
            }
            initSelect();

            $("#add-player").click(function() {
                const row = `
                    <tr>
                      <td><input type="number" name="new_stt" placeholder="STT"></td>
                      <td><input type="text" name="new_name" placeholder="Tên cầu thủ" required></td>
                      <td><input type="number" name="new_number" placeholder="Số áo"></td>
                      <td>
                        <select name="new_position" class="position-select" multiple>
                          <option value="GK">GK</option><option value="LB">LB</option><option value="RB">RB</option>
                          <option value="CB">CB</option><option value="LW">LW</option><option value="RW">RW</option>
                          <option value="SS">SS</option><option value="ST">ST</option><option value="CF">CF</option>
                          <option value="LM">LM</option><option value="RM">RM</option><option value="AM">AM</option>
                          <option value="CM">CM</option><option value="DM">DM</option><option value="COACH">COACH</option>
                          <option value="CLUB OWNER">CLUB OWNER</option><option value="BHL">BHL</option>
                        </select>
                      </td>
                      <td><img class="avatar-thumb" src="/static/avatar-default.svg" alt="avatar"></td>
                      <td>Chưa lưu</td>
                    </tr>`;
                $("#players-table").append(row);
                initSelect();
            });
        });
    </script>
</body>
</html>
